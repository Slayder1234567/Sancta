<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Sancta</title>
<link rel="icon" type="image/jpeg" href="photos/logo.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'DM Sans', sans-serif;
  color: #0b1425;
  background: #faf9f7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.success-wrap {
  text-align: center;
  max-width: 480px;
}

.success-check {
  width: 64px;
  height: 64px;
  border: 1px solid rgba(11,20,37,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 40px;
  animation: fadeIn 0.6s ease both;
}

.success-check svg { width: 24px; height: 24px; }

.success-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 5vw, 52px);
  font-weight: 300;
  letter-spacing: 0.02em;
  color: #0b1425;
  margin-bottom: 16px;
  animation: fadeUp 0.6s 0.1s ease both;
}

.success-sub {
  font-size: 14px;
  color: #0b1425;
  opacity: 0.5;
  line-height: 1.8;
  margin-bottom: 56px;
  animation: fadeUp 0.6s 0.2s ease both;
}

.success-back {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #0b1425;
  text-decoration: none;
  border-bottom: 1px solid rgba(11,20,37,0.25);
  padding-bottom: 3px;
  transition: opacity 0.2s;
  animation: fadeUp 0.6s 0.3s ease both;
  display: inline-block;
}

.success-back:hover { opacity: 0.5; }

@keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="success-wrap">
  <div class="success-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0b1425" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1 class="success-title">Thank you for your order.</h1>
  <p class="success-sub">Your Sancta piece is being prepared with care.<br>A confirmation has been sent to your email address.</p>
  <a href="index.html" class="success-back">Return to Sancta</a>
</div>
</body>
</html>
